
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Interactive Page</title>
    <style>
      :root {
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --color-background: #0b1220;
        --color-background-primary: #111827;
        --color-background-secondary: rgba(148, 163, 184, 0.08);
        --color-background-card: rgba(15, 23, 42, 0.9);
        --color-border-secondary: rgba(148, 163, 184, 0.18);
        --color-border-tertiary: rgba(148, 163, 184, 0.12);
        --color-border-info: #60a5fa;
        --color-text-primary: #e2e8f0;
        --color-text-secondary: #94a3b8;
        --color-text-info: #bfdbfe;
        --color-background-info: rgba(59, 130, 246, 0.16);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: var(--font-sans);
        background: radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 26%), #020617;
        color: var(--color-text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      #main {
        width: min(100%, 560px);
        background: var(--color-background-card);
        border: 1px solid rgba(148, 163, 184, 0.1);
        border-radius: 24px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
      }

      #display-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        padding: 1.5rem 2rem;
        text-align: center;
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #display-text {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--color-text-primary);
        transition: opacity 0.2s ease;
      }

      #btn-row {
        display: flex;
        gap: 0.85rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .action-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 999px;
        padding: 0.85rem 1.35rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--color-text-primary);
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }

      .action-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .action-btn:active {
        transform: scale(0.98);
      }

      .action-btn.active {
        border-color: var(--color-border-info);
        color: var(--color-text-info);
        background: rgba(59, 130, 246, 0.18);
      }

      #info-card {
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        padding: 1.25rem 1.5rem;
        width: 100%;
        max-width: 100%;
        display: none;
      }

      #info-card.show {
        display: block;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        padding: 0.65rem 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        font-size: 0.92rem;
      }

      .info-row:last-of-type {
        border-bottom: none;
      }

      .info-label {
        color: var(--color-text-secondary);
      }

      .info-value {
        color: var(--color-text-primary);
        font-weight: 600;
      }

      #profile-section {
        width: 100%;
        max-width: 100%;
        display: none;
      }

      #profile-section.show {
        display: block;
      }

      #show-profile-btn {
        width: 100%;
        margin-top: 1rem;
        background: transparent;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        padding: 0.95rem 1.25rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--color-text-primary);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      #show-profile-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      #profile-pic-wrap {
        display: none;
        margin-top: 1rem;
        justify-content: center;
      }

      #profile-pic-wrap.show {
        display: flex;
      }

      #avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid rgba(96, 165, 250, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.03);
      }

      #avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>
</head>
<body>
<div id="main">
  <div id="display-box">
    <span id="display-text"><span class="info-label"> Everyday is a new opportunity to learn new things👨‍💻👨‍💻☠️</span></span>
  </div>

  <div id="btn-row">
    <button class="action-btn" id="btn-click" onclick="handleClick()">Click Me</button>
    <button class="action-btn" id="btn-greet" onclick="handleGreet()">Greetings</button>
    <button class="action-btn" id="btn-info" onclick="handleInfo()">My Info</button>
  </div>

  <div id="info-card">
    <div class="info-row"><span class="info-label">About</span><br><span class="info-value"><br>I’m Aberiyele Moses Wepia, a Computer Science student based in Accra, Ghana. I’m passionate about software development and solving real-world problems through code.</span></div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-value"><a href="mailto:genesiswepia@gmail.com">genesiswepia@gmail.com</a></span></div>
    <div class="info-row"><span class="info-label">Facebook</span><span class="info-value"><a href="https://www.facebook.com/profile.php?id=100082260197078" target="_blank">Facebook Profile</a></span></div>

    <div id="profile-section">
      <button id="show-profile-btn" onclick="toggleProfile()">Show Profile</button>
      <div id="profile-pic-wrap">
        <div id="avatar">
          <img src="profile.jpg" alt="Profile picture">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let activeBtn = null;

  function setDisplay(text) {
    const el = document.getElementById('display-text');
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = text; el.style.opacity = '1'; }, 150);
  }

  function clearActive() {
    document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
  }

  function handleClick() {
    clearActive();
    document.getElementById('btn-click').classList.add('active');
    setDisplay('You have clicked this button.');
    document.getElementById('info-card').classList.remove('show');
  }

  function handleGreet() {
    const greetings = ['Hey there, welcome!', 'Good to see you!', 'Greetings, tech wizard!', 'Hello, fellow builder!'];
    clearActive();
    document.getElementById('btn-greet').classList.add('active');
    setDisplay(greetings[Math.floor(Math.random() * greetings.length)]);
    document.getElementById('info-card').classList.remove('show');
  }

  function handleInfo() {
    clearActive();
    document.getElementById('btn-info').classList.add('active');
    setDisplay('About me:');
    const card = document.getElementById('info-card');
    card.classList.add('show');
    document.getElementById('profile-section').classList.add('show');
    document.getElementById('profile-pic-wrap').classList.remove('show');
    document.getElementById('show-profile-btn').textContent = 'Show Profile';
  }

  function toggleProfile() {
    const wrap = document.getElementById('profile-pic-wrap');
    const btn = document.getElementById('show-profile-btn');
    if (wrap.classList.contains('show')) {
      wrap.classList.remove('show');
      btn.textContent = 'Show Profile';
    } else {
      wrap.classList.add('show');
      btn.textContent = 'Hide Profile';
    }
  }
</script>
</body>
</html>
